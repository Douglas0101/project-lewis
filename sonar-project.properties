sonar.projectKey=Douglas0101_project-lewis
sonar.organization=douglas0101

# Python version used by the project; avoids "analyzed as compatible with all Python 3 versions" warning.
sonar.python.version=3.12

# Force UTF-8 source encoding; avoids "problems with file encoding" warnings.
sonar.sourceEncoding=UTF-8

# Exclude generated, vendored, data and artifact directories from analysis.
sonar.exclusions=\
  .venv/**,\
  .git/**,\
  .github/**,\
  .pytest_cache/**,\
  .mypy_cache/**,\
  __pycache__/**,\
  firmware/third_party/**,\
  firmware/tools/**,\
  firmware/build/**,\
  data/**,\
  models/**,\
  experiments/**,\
  notebooks/**,\
  snapshots/**,\
  build/**
