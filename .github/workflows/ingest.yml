name: Camada 1 Ingest (QG0 + Catalog)

on:
  push:
    branches: [main, develop]
    paths:
      - "src/data/**"
      - "tests/test_download*.py"
      - "src/data/checksums.json"
      - ".github/workflows/ingest.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/data/**"
      - "tests/test_download*.py"
      - "src/data/checksums.json"
      - ".github/workflows/ingest.yml"
      - "pyproject.toml"
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  ingest-smoke:
    name: Ingest smoke (fast, no network datasets)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ingest smoke tests
        run: uv run pytest tests/test_download_smoke.py -m smoke --tb=short

      - name: Build catalog from synthetic fixtures
        run: uv run pytest tests/test_download_smoke.py::test_smoke_catalog_build -v --tb=short

  qg0-full:
    name: Quality Gate QG0 — full dataset ingest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: |
            data/.cache/zips
            data/raw_chapman
            data/raw_mitbih
            data/raw_svdb
            data/raw_afdb
            data/raw_incart
          key: datasets-${{ hashFiles('src/data/checksums.json') }}
          restore-keys: |
            datasets-

      - name: Restore from mirror (offline-safe)
        run: |
          if [ ! -d data/raw_mitbih ] || [ -z "$(ls -A data/raw_mitbih 2>/dev/null)" ]; then
            echo "::warning::Cache miss — tentando restaurar de mirrors..."
            mkdir -p data/raw_chapman data/raw_mitbih data/raw_svdb data/raw_afdb data/raw_incart
            if [ -f data/mirrors/chapman_mirror.tar.gz ]; then
              tar xzf data/mirrors/chapman_mirror.tar.gz -C data/raw_chapman/
            fi
            if [ -f data/mirrors/mitbih_family_mirror.tar.gz ]; then
              tar xzf data/mirrors/mitbih_family_mirror.tar.gz -C data/raw_mitbih/
            fi
          fi

      - name: Download datasets if still missing
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        timeout-minutes: 120
        run: |
          missing=0
          for dir in data/raw_chapman data/raw_mitbih data/raw_svdb data/raw_afdb data/raw_incart; do
            if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              missing=1
              echo "::warning::$dir está vazio"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::notice::Executando make download-all..."
            uv run make download-all
          fi

      - name: Build catalog
        run: uv run python -c "from src.data._catalog import build_catalog; build_catalog()"

      - name: Quality Gate QG0
        env:
          LEWIS_REQUIRE_DATA: "1"
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run make qg0

      - name: Upload QG0 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qg0-report
          path: |
            data/catalog/dataset_catalog.jsonl
            data/audit/ingestion.jsonl
            data/.dlq/
