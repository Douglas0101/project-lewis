name: CI — Hard Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  ALLOW_STUB: "0"
  CI: "1"

jobs:
  hard-gates:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ make curl tar binutils

      - name: Install Python dependencies
        run: |
          uv sync --frozen
          uv pip install robotframework

      - name: Cache firmware toolchain / Renode
        uses: actions/cache@v4
        with:
          path: firmware/tools
          key: firmware-tools-${{ runner.os }}-${{ hashFiles('firmware/scripts/install_deps.sh') }}
          restore-keys: |
            firmware-tools-${{ runner.os }}-

      - name: Install firmware tooling
        run: uv run make firmware-deps

      - name: Verify Renode Version
        run: uv run make verify-renode

      - name: Lint
        run: uv run make lint

      - name: Tests
        run: uv run make test

      - name: Run hard gates
        run: uv run make hard-gates-ci

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hard-gates
          path: |
            firmware/build/stm32f4/*.elf
            firmware/build/stm32f4/*.bin
            firmware/build/stm32f4/*.map
            reports/*.json
            reports/*.md
