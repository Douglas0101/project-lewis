name: Data Quality Audit (pre-training)

on:
  push:
    branches: [main, develop]
    paths:
      - "src/data/**"
      - "src/features/**"
      - "scripts/audit_training_data.py"
      - "tests/test_training_data_audit.py"
      - "tests/test_*.py"
      - "pyproject.toml"
      - ".github/workflows/data-quality-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/data/**"
      - "src/features/**"
      - "scripts/audit_training_data.py"
      - "tests/test_training_data_audit.py"
      - "pyproject.toml"
      - ".github/workflows/data-quality-audit.yml"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  CI: "1"

jobs:
  data-quality-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: |
            data/.cache/zips
            data/raw_chapman
            data/raw_mitbih
            data/raw_svdb
            data/raw_afdb
            data/raw_incart
            data/processed
            data/lineage
          key: datasets-${{ hashFiles('src/data/checksums.json') }}
          restore-keys: |
            datasets-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build catalog
        run: uv run python -c "from src.data._catalog import build_catalog; build_catalog()"

      - name: Run pre-training data quality audit
        env:
          LEWIS_REQUIRE_DATA: "1"
        run: uv run make audit-training-data

      - name: Run data-quality tests
        env:
          LEWIS_REQUIRE_DATA: "1"
        run: uv run pytest tests/test_training_data_audit.py tests/test_dsp_filters.py tests/test_dsp_fidelity.py -v --tb=short

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-data-audit
          path: |
            reports/training_data_audit.json
            reports/training_data_audit.md
            data/.dlq/
