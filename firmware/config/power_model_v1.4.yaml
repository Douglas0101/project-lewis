# Modelo de consumo energético para simulação Renode v1.4
# Valores típicos @ 25 °C, VDD = 3.3 V.
# Fontes: STM32F405/407 datasheet DS8626 Rev 11; ADS1292R datasheet SBAS502C.
# Os valores devem ser calibrados em hardware real antes de decisões críticas.
schema_version: "1.4.0"
voltage_v: 3.3
battery_capacity_mah: 500

mcu:
  # Estados da CPU. Os valores de current_ma já incluem os periféricos
  # essenciais do cenário de simulação (UART4 + TIM2 + Flash), salvo
  # indicação contrária. Não somar peripherals_increment_ma novamente
  # para esses periféricos nos estados abaixo.
  states:
    active:
      current_ma: 90.0
      source: "STM32F407 Run @ 168 MHz, periféricos ON (extrapolado da Figura 25 / Tabela 22)"
      description: "Cortex-M4 @ 168 MHz, UART4 + TIM2 + Flash habilitados"
    inference:
      current_ma: 95.0
      source: "Estimativa: Run + aceleração DSP/FPU + TFLM + CMSIS-NN"
      description: "Run + aceleração DSP/FPU + TFLM + CMSIS-NN"
    sleep:
      current_ma: 60.0
      source: "STM32F407 Sleep @ 168 MHz (Tabela 22), inclui UART4 + TIM2 clocked"
      description: "Sleep @ 168 MHz (WFI), TIM2 e UART4 clocked"
    stop:
      current_ma: 0.35
      source: "STM32F407 Stop mode com regulador low-power (Tabela 23)"
      description: "Stop mode com regulador low-power"
    standby:
      current_ma: 0.003
      source: "STM32F407 Standby mode (Tabela 24)"
      description: "Standby mode"

  # Incrementos de corrente por periférico, a serem somados quando o
  # periférico estiver habilitado mas NÃO estiver incluído no estado base.
  # Valores por MHz de clock do periférico (DS8626 Rev 11, Tabela 28).
  # NOTA: adc_stm32_internal refere-se ao ADC do STM32; o ADS1292R é
  # modelado separadamente na seção `afe`.
  peripherals_increment_ma:
    uart4: 0.0033
    tim2: 0.0165
    adc_stm32_internal: 1.6  # analog part, when ADON=1 (adicional ao estado base)

afe:
  model: "ADS1292R"
  channels: 1
  sample_rate_sps: 500
  states:
    normal:
      # Consumo por canal; multiplicar por `channels` no cálculo total.
      power_uw_per_channel: 335
      source: "ADS1292R Normal mode, AVDD=3 V, DVDD=1.8 V (SBAS502C)"
    standby:
      # Consumo total do dispositivo em standby (não por canal).
      power_uw: 160
      source: "ADS1292R Standby mode (SBAS502C)"
    power_down:
      # Consumo total do dispositivo em power-down.
      power_uw: 1
      source: "ADS1292R Power-down mode (SBAS502C)"

assumptions:
  duty_cycle_beats_per_s: 1    # batimentos por segundo no cenário de referência
  temperature_c: 25
  notes: |
    - O modelo não considera variação de tensão, temperatura nem processo.
    - A corrente do estado `inference` é uma estimativa; validar com instrumentação real.
    - O consumo do AFE em modo normal deve ser convertido para mA dividindo
      `power_uw_per_channel * channels` por `voltage_v`.
