preprocess_v1.0:
  version: "1.0.0"
  resample:
    target_fs: 500.0
    method: "resample_poly"
    padtype: "line"
  filter:
    type: "butterworth"
    order: 4
    lowcut: 0.5
    highcut: 40.0
    implementation: "filtfilt"
  detrend:
    type: "linear"
  normalization:
    type: "zscore_global"
    eps: 1.0e-12
    per_record: false
  outlier_clipping:
    enabled: true
    method: "fixed"           # "fixed" ou "percentile"
    fixed_limits: [-5.0, 5.0] # mV; usado quando method=fixed
    percentile: 0.001         # caudas simétricas; usado quando method=percentile
    max_abs_limit: 10.0       # teto de segurança absoluto (mV)
  post_normalize_clipping:
    enabled: true
    zscore_limits: [-10.0, 10.0]  # clipa z-scores residuais extremos após normalização
